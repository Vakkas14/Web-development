<!DOCTYPE html>
<html>

<head>
    <title>HTML Basic Tags Example</title>
</head>

<body>
    <div id ="heading-and-paragraph">
        <h1>HTML Basic Tags</h1>
        <p>This is an example of basic HTML tags.</p>
    </div>

    <hr>

    <div id="list-ellements">
        <h2>Lists</h2>

        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
        </ul>

        <ol>
            <li>Learn HTML</li>
            <li>Learn CSS</li>
            <li>Learn JavaScript</li>
        </ol>
    </div>

    <div id="links-and-images">
        <h2>Links</h2>

            <a href="https://google.com">
                Visit Google
            </a>

            <br><br>

            <img src="assests/Minimalist high-contrast wolf head design with striking red background.jpeg"
                alt="Wolf Image"
                width="200">

    </div>

    <div id="text-formatting">
        <h2>Text Formatting</h2>

        <p>
            <strong>Bold Text</strong><br>
            <em>Italic Text</em>
        </p>
    </div>

    <div id = "form-example">
        <h2>Form Example</h2>
        <form>

            <label>Name:</label>
            <input type="text">

            <br><br>

            <button type="submit">
                Submit
            </button>

        </form>
    </div>

    <div id = "table-elements">
        <h2>Table Example</h2>

        <table border="1">

            <tr>
                <th>Name</th>
                <th>Age</th>
            </tr>

            <tr>
                <td>John</td>
                <td>25</td>
            </tr>

            <tr>
                <td>Emma</td>
                <td>22</td>
            </tr>

        </table>
    </div>
</body>

</html>
